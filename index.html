<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finishing sign-in…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #fafafa;
      color: #222;
    }
    .card {
      max-width: 420px;
      padding: 32px 28px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    h1 { font-size: 18px; margin: 0 0 8px; font-weight: 600; }
    p { font-size: 14px; line-height: 1.55; color: #555; margin: 8px 0; }
    .spinner {
      width: 24px; height: 24px; margin: 0 auto 14px;
      border: 2.5px solid #eee; border-top-color: #222;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #c33; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="heading">Returning you to the app…</h1>
    <p id="msg">Forwarding your TikTok sign-in back to the editor.</p>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const state = params.get("state") || "";
      const port = state.split(":")[1];

      const heading = document.getElementById("heading");
      const msg = document.getElementById("msg");
      const spinner = document.getElementById("spinner");

      function done(text) {
        spinner.style.display = "none";
        heading.textContent = "Done";
        msg.textContent = text;
      }
      function fail(text) {
        spinner.style.display = "none";
        heading.textContent = "Something went wrong";
        heading.className = "error";
        msg.textContent = text;
      }

      if (!port) {
        fail("Missing port in OAuth state. Re-open the app and try again.");
        return;
      }

      fetch("http://127.0.0.1:" + port + "/callback" + location.search)
        .then(function () { done("You can close this tab and return to the app."); })
        .catch(function () { fail("Couldn't reach the app. Make sure it's still open, then retry sign-in."); });
    })();
  </script>
</body>
</html>
